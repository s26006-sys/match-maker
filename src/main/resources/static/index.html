<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Matchmaker Pro | Standalone Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;700;900&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: #ffffff; }
        .bw-card { background: #121212; border: 1px solid #262626; }
        .bw-pitch { background: #0a0a0a; border: 1px solid #262626; }
        .drop-zone { transition: all 0.2s ease; min-height: 55px; border: 1px dashed #262626; }
        .drop-zone.drag-over { background: #1a1a1a; border-color: #ffffff; }
        .player-chip { cursor: grab; user-select: none; }
        .player-chip:active { cursor: grabbing; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #404040; border-radius: 2px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex items-center justify-center relative">

<main class="w-full max-w-[1500px] mx-auto space-y-5">

    <header class="flex flex-col sm:flex-row justify-between items-center bg-[#121212] border border-[#262626] rounded-xl p-4 gap-4">
        <div>
            <span class="text-xl font-black tracking-tight text-white">MATCHMAKER PRO</span>
            <p class="text-[11px] text-neutral-400 mt-0.5">Standalone Black & White Layout (GK Split Enabled)</p>
        </div>
        <div class="flex gap-2">
            <button onclick="fillSamplePlayers()" class="bg-[#262626] hover:bg-[#333333] border border-[#404040] text-neutral-200 font-bold px-4 py-2 rounded-lg text-xs transition">
                👥 샘플 16명 채우기
            </button>
            <button onclick="resetAll()" class="border border-[#262626] hover:bg-[#1a1a1a] text-neutral-400 px-4 py-2 rounded-lg text-xs transition">
                전체 초기화
            </button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-5 lg:h-[720px]">

        <div class="lg:col-span-5 flex flex-col gap-4 h-full">

            <div class="bw-card rounded-xl p-4 flex justify-between items-center">
                <div>
                    <h2 class="text-xs font-bold text-neutral-300">선수 등록</h2>
                    <p class="text-[10px] text-neutral-500">포지션과 실력을 지정합니다.</p>
                </div>
                <button onclick="openRegisterModal()" class="bg-white hover:bg-neutral-200 text-black px-5 py-2.5 rounded-lg text-xs font-black transition">
                    + 신규 선수 등록
                </button>
            </div>

            <div class="bw-card rounded-xl p-4 flex flex-col flex-1 min-h-[250px]">
                <div class="flex justify-between items-center border-b border-[#262626] pb-2 mb-3">
                    <h2 class="text-xs font-bold text-neutral-400">💡 [체크: 출석] [글자: 정보 수정]</h2>
                    <span class="text-xs font-bold text-white bg-[#262626] px-2.5 py-1 rounded">
                            출석: <span id="attendCount">0</span>명
                        </span>
                </div>
                <div id="clickPlayerList" class="grid grid-cols-1 sm:grid-cols-2 gap-2 overflow-y-auto flex-1 pr-1 custom-scrollbar"></div>
            </div>

            <div class="bw-card rounded-xl p-4 space-y-2">
                <div class="flex justify-between items-center">
                    <h2 class="text-xs font-bold text-neutral-300">📋 팀 매칭 결과</h2>
                    <button onclick="copyToClipboard()" class="bg-white hover:bg-neutral-200 text-black text-[11px] font-black px-4 py-1.5 rounded-lg transition">
                        결과 복사
                    </button>
                </div>
                <textarea id="shareTextResult" rows="4" readonly class="w-full bg-black border border-[#262626] rounded-lg p-2.5 text-xs text-neutral-300 outline-none resize-none font-mono" placeholder="팀 짜기 가동 시 결과 텍스트가 자동 생성됩니다."></textarea>
            </div>
        </div>

        <div class="lg:col-span-7 flex flex-col h-full">
            <div class="bw-card rounded-xl overflow-hidden flex flex-col h-full">
                <div class="p-4 bg-[#1a1a1a] border-b border-[#262626] flex justify-between items-center">
                    <div>
                        <h2 class="text-xs font-bold text-white">🏆 스쿼드 배치판</h2>
                        <p class="text-[10px] text-neutral-400">마우스 드래그로 라인업을 미세 조정하세요.</p>
                    </div>
                    <button onclick="mixAndMatchTeamsLocal()" class="px-6 py-3 bg-white hover:bg-neutral-200 text-black font-black rounded-xl text-xs transition">
                        ⚽ 팀 짜기 가동
                    </button>
                </div>

                <div class="bw-pitch p-5 flex flex-col sm:flex-row gap-5 flex-1">
                    <div class="flex-1 border border-[#262626] bg-[#121212]/50 rounded-xl p-4 flex flex-col justify-between relative space-y-2">
                        <span class="text-xs font-black text-white block border-b border-[#262626] pb-1">TEAM A</span>
                        <div class="w-full flex flex-col justify-between h-full space-y-3">
                            <div><span class="text-[9px] text-neutral-500 font-bold block mb-1">FW</span><div id="zone-A-FW" class="drop-zone flex justify-center gap-2 p-2 bg-black rounded-xl items-center flex-wrap"></div></div>
                            <div><span class="text-[9px] text-neutral-500 font-bold block mb-1">MF</span><div id="zone-A-MF" class="drop-zone flex justify-center gap-2 p-2 bg-black rounded-xl items-center flex-wrap"></div></div>
                            <div><span class="text-[9px] text-neutral-500 font-bold block mb-1">DF</span><div id="zone-A-DF" class="drop-zone flex justify-center gap-2 p-2 bg-black rounded-xl items-center flex-wrap"></div></div>
                            <div><span class="text-[9px] text-neutral-500 font-bold block mb-1">GK</span><div id="zone-A-GK" class="drop-zone flex justify-center gap-2 p-2 bg-black rounded-xl items-center flex-wrap"></div></div>
                        </div>
                    </div>

                    <div class="flex-1 border border-[#262626] bg-[#121212]/50 rounded-xl p-4 flex flex-col justify-between relative space-y-2">
                        <span class="text-xs font-black text-white block border-b border-[#262626] pb-1">TEAM B</span>
                        <div class="w-full flex flex-col justify-between h-full space-y-3">
                            <div><span class="text-[9px] text-neutral-500 font-bold block mb-1">FW</span><div id="zone-B-FW" class="drop-zone flex justify-center gap-2 p-2 bg-black rounded-xl items-center flex-wrap"></div></div>
                            <div><span class="text-[9px] text-neutral-500 font-bold block mb-1">MF</span><div id="zone-B-MF" class="drop-zone flex justify-center gap-2 p-2 bg-black rounded-xl items-center flex-wrap"></div></div>
                            <div><span class="text-[9px] text-neutral-500 font-bold block mb-1">DF</span><div id="zone-B-DF" class="drop-zone flex justify-center gap-2 p-2 bg-black rounded-xl items-center flex-wrap"></div></div>
                            <div><span class="text-[9px] text-neutral-500 font-bold block mb-1">GK</span><div id="zone-B-GK" class="drop-zone flex justify-center gap-2 p-2 bg-black rounded-xl items-center flex-wrap"></div></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="playerModal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-50 p-4">
    <div class="bw-card w-full max-w-md rounded-2xl p-6 space-y-4 bg-[#121212]">
        <div class="flex justify-between items-center border-b border-[#262626] pb-2">
            <h3 id="modalTitle" class="text-sm font-black text-white">선수 정보 입력</h3>
            <button onclick="closeModal()" class="text-neutral-500 hover:text-white text-sm">✕</button>
        </div>
        <input type="hidden" id="modalTargetId">
        <div class="space-y-3 text-xs">
            <div>
                <label class="block text-neutral-400 mb-1 font-bold">선수 이름</label>
                <input id="modalName" type="text" class="w-full bg-black border border-[#262626] rounded-lg p-2.5 text-white outline-none focus:border-white">
            </div>
            <div>
                <label class="block text-neutral-400 mb-1 font-bold">선호 포지션</label>
                <div class="grid grid-cols-4 gap-2">
                    <button type="button" onclick="setModalPos('FW')" id="btn-pos-FW" class="pos-btn py-2 bg-black border border-[#262626] rounded-lg font-bold text-neutral-400">FW</button>
                    <button type="button" onclick="setModalPos('MF')" id="btn-pos-MF" class="pos-btn py-2 bg-black border border-[#262626] rounded-lg font-bold text-neutral-400">MF</button>
                    <button type="button" onclick="setModalPos('DF')" id="btn-pos-DF" class="pos-btn py-2 bg-black border border-[#262626] rounded-lg font-bold text-neutral-400">DF</button>
                    <button type="button" onclick="setModalPos('GK')" id="btn-pos-GK" class="pos-btn py-2 bg-black border border-[#262626] rounded-lg font-bold text-neutral-400">GK</button>
                </div>
                <input type="hidden" id="modalPos" value="MF">
            </div>
            <div>
                <label class="block text-neutral-400 mb-1 font-bold">실력 등급</label>
                <div class="grid grid-cols-3 gap-2">
                    <button type="button" onclick="setModalTier('상')" id="btn-tier-상" class="tier-btn py-2 bg-black border border-[#262626] rounded-lg font-bold text-neutral-400">상</button>
                    <button type="button" onclick="setModalTier('중')" id="btn-tier-중" class="tier-btn py-2 bg-black border border-[#262626] rounded-lg font-bold text-neutral-400">중</button>
                    <button type="button" onclick="setModalTier('하')" id="btn-tier-하" class="tier-btn py-2 bg-black border border-[#262626] rounded-lg font-bold text-neutral-400">하</button>
                </div>
                <input type="hidden" id="modalTier" value="중">
            </div>
        </div>
        <div class="flex gap-2 pt-2 text-xs">
            <button onclick="closeModal()" class="flex-1 border border-[#262626] hover:bg-[#1a1a1a] py-2.5 rounded-lg font-bold">취소</button>
            <button onclick="saveModalData()" class="flex-1 bg-white hover:bg-neutral-200 text-black font-black py-2.5 rounded-lg">저장하기</button>
        </div>
    </div>
</div>

<script>
    let clubPlayers = JSON.parse(localStorage.getItem('BW_MODAL_PLAYERS_V2')) || [];
    let todayAttendedIds = [];
    let currentPitchPlayers = [];

    window.onload = function() {
        initDragAndDropHandlers();
        renderPlayerCards();
    };

    function openRegisterModal() {
        document.getElementById('modalTitle').innerText = '선수 등록';
        document.getElementById('modalTargetId').value = '';
        document.getElementById('modalName').value = '';
        setModalPos('MF'); setModalTier('중');
        document.getElementById('playerModal').classList.remove('hidden');
    }

    function openEditModal(id) {
        const p = clubPlayers.find(cp => cp.id === id);
        if(!p) return;
        document.getElementById('modalTitle').innerText = '선수 정보 수정';
        document.getElementById('modalTargetId').value = p.id;
        document.getElementById('modalName').value = p.name;
        setModalPos(p.preferredPosition); setModalTier(p.tier);
        document.getElementById('playerModal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('playerModal').classList.add('hidden'); }

    function setModalPos(pos) {
        document.getElementById('modalPos').value = pos;
        document.querySelectorAll('.pos-btn').forEach(b => b.className = "pos-btn py-2 bg-black border border-[#262626] text-neutral-400 rounded-lg font-bold");
        document.getElementById(`btn-pos-${pos}`).className = "pos-btn py-2 bg-white text-black rounded-lg font-black border border-white";
    }

    function setModalTier(tier) {
        document.getElementById('modalTier').value = tier;
        document.querySelectorAll('.tier-btn').forEach(b => b.className = "tier-btn py-2 bg-black border border-[#262626] rounded-lg font-bold text-neutral-400");
        document.getElementById(`btn-tier-${tier}`).className = "tier-btn py-2 bg-white text-black font-black border border-white rounded-lg";
    }

    function saveModalData() {
        const id = document.getElementById('modalTargetId').value;
        const name = document.getElementById('modalName').value.trim();
        const pos = document.getElementById('modalPos').value;
        const tier = document.getElementById('modalTier').value;
        const ratingMap = { '상': 80, '중': 50, '하': 20 };

        if(!name) return alert('선수 이름을 입력해 주세요.');

        if(!id) {
            if(clubPlayers.some(p => p.name === name)) return alert('이미 존재하는 선수명입니다.');
            const newPlayer = {
                id: 'P_' + Date.now() + Math.random().toString(36).substr(2, 4),
                name: name, preferredPosition: pos, tier: tier, internalRating: ratingMap[tier]
            };
            clubPlayers.push(newPlayer);
            todayAttendedIds.push(newPlayer.id);
        } else {
            const p = clubPlayers.find(cp => cp.id === id);
            if(p) {
                p.name = name; p.preferredPosition = pos; p.tier = tier; p.internalRating = ratingMap[tier];
            }
        }
        saveData(); renderPlayerCards(); closeModal();
    }

    function deletePlayer(id) {
        if(confirm('해당 선수를 명단에서 삭제하시겠습니까?')) {
            clubPlayers = clubPlayers.filter(p => p.id !== id);
            todayAttendedIds = todayAttendedIds.filter(aid => aid !== id);
            saveData(); renderPlayerCards();
        }
    }

    function renderPlayerCards() {
        const container = document.getElementById('clickPlayerList');
        container.innerHTML = '';
        if(clubPlayers.length === 0) {
            container.innerHTML = `<p class="text-xs text-neutral-500 text-center py-12 col-span-full">등록된 멤버가 없습니다.</p>`;
            document.getElementById('attendCount').innerText = 0;
            return;
        }
        clubPlayers.forEach(p => {
            const isAttended = todayAttendedIds.includes(p.id);
            const card = document.createElement('div');
            card.className = `p-2.5 rounded-xl border text-white flex justify-between items-center select-none transition relative ${isAttended ? 'bg-[#1c1c1c] border-[#404040]' : 'bg-[#0a0a0a] border-[#262626] opacity-40'}`;
            card.innerHTML = `
                    <div class="flex items-center gap-2 truncate flex-1 h-full" onclick="openEditModal('${p.id}')">
                        <span onclick="event.stopPropagation(); toggleAttendance('${p.id}')" class="w-5 h-5 rounded-full ${isAttended ? 'bg-white text-black' : 'bg-black border border-[#404040] text-transparent'} flex items-center justify-center cursor-pointer text-[10px] font-black transition">
                            ${isAttended ? '✓' : ''}
                        </span>
                        <div class="flex flex-col cursor-pointer pl-1 truncate">
                            <span class="text-xs font-bold truncate">${p.name}</span>
                            <span class="text-[9px] text-neutral-400 font-normal mt-0.5">${p.preferredPosition}</span>
                        </div>
                    </div>
                    <div class="mr-6 cursor-pointer" onclick="openEditModal('${p.id}')">
                        <span class="text-[9px] font-bold border border-[#404040] px-2 py-0.5 rounded text-neutral-300">
                            ${p.tier}
                        </span>
                    </div>
                    <button onclick="event.stopPropagation(); deletePlayer('${p.id}')" class="absolute right-1.5 top-2.5 text-[10px] text-neutral-600 hover:text-white px-1">✕</button>
                `;
            container.appendChild(card);
        });
        document.getElementById('attendCount').innerText = todayAttendedIds.length;
    }

    function toggleAttendance(id) {
        if(todayAttendedIds.includes(id)) todayAttendedIds = todayAttendedIds.filter(aid => aid !== id);
        else todayAttendedIds.push(id);
        renderPlayerCards();
    }

    // 🧠 골키퍼 강제 분리형 밸런싱 알고리즘
    function mixAndMatchTeamsLocal() {
        if(todayAttendedIds.length < 2) return alert('출석 체크된 인원이 최소 2명 이상이어야 합니다.');

        let players = todayAttendedIds.map(id => clubPlayers.find(p => p.id === id)).filter(Boolean);

        // 1. 골키퍼(GK) 자원과 필드(FW, MF, DF) 자원 분리
        let gks = players.filter(p => p.preferredPosition === 'GK');
        let fields = players.filter(p => p.preferredPosition !== 'GK');

        // 랜덤성 확보를 위해 각각 1차 셔플
        gks.sort(() => Math.random() - 0.5);
        fields.sort(() => Math.random() - 0.5);

        // 실력순 정렬 (높은 점수 우선)
        gks.sort((a, b) => b.internalRating - a.internalRating);
        fields.sort((a, b) => b.internalRating - a.internalRating);

        let teamA = []; let teamB = [];
        let scoreA = 0; let scoreB = 0;

        // 2. 골키퍼 먼저 균등하게 찢어놓기
        gks.forEach(p => {
            if (scoreA <= scoreB) {
                teamA.push(p); scoreA += p.internalRating;
            } else {
                teamB.push(p); scoreB += p.internalRating;
            }
        });

        // 3. 남은 필드 유저들 시소게임 분배
        fields.forEach(p => {
            if (scoreA <= scoreB) {
                teamA.push(p); scoreA += p.internalRating;
            } else {
                teamB.push(p); scoreB += p.internalRating;
            }
        });

        currentPitchPlayers = [];
        teamA.forEach(p => currentPitchPlayers.push({ id: 'pitch_' + Math.random().toString(36).substr(2,4), name: p.name, tier: p.tier, side: 'A', pos: p.preferredPosition }));
        teamB.forEach(p => currentPitchPlayers.push({ id: 'pitch_' + Math.random().toString(36).substr(2,4), name: p.name, tier: p.tier, side: 'B', pos: p.preferredPosition }));

        renderPitchSquads();
    }

    function renderPitchSquads() {
        document.querySelectorAll('.drop-zone').forEach(z => z.innerHTML = '');
        currentPitchPlayers.forEach(p => {
            const zone = document.getElementById(`zone-${p.side}-${p.pos}`);
            if(!zone) return;
            const chip = document.createElement('div');
            chip.id = p.id; chip.draggable = true;
            chip.className = `player-chip px-2.5 py-1.5 rounded-lg text-xs font-bold bg-black border border-[#404040] text-white flex items-center shadow-md select-none`;
            chip.innerText = `${p.name}(${p.tier})`;
            chip.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', p.id); });
            zone.appendChild(chip);
        });
        buildShareText();
    }

    function initDragAndDropHandlers() {
        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
            zone.addEventListener('dragleave', () => { zone.classList.remove('drag-over'); });
            zone.addEventListener('drop', (e) => {
                e.preventDefault(); zone.classList.remove('drag-over');
                const chipId = e.dataTransfer.getData('text/plain');
                const targetPlayer = currentPitchPlayers.find(p => p.id === chipId);
                if(targetPlayer) {
                    const tokens = zone.id.split('-');
                    targetPlayer.side = tokens[1]; targetPlayer.pos = tokens[2];
                    renderPitchSquads();
                }
            });
        });
    }

    function buildShareText() {
        const getTeamList = (side) => {
            return ['FW', 'MF', 'DF', 'GK'].map(pos => {
                const match = currentPitchPlayers.filter(p => p.side === side && p.pos === pos);
                if(match.length === 0) return '';
                return `${pos}: ` + match.map(p => `${p.name}(${p.tier})`).join(', ');
            }).filter(str => str !== '').join('\n  ');
        };
        const txt = `[TEAM MATCHING RESULT]\n\n● TEAM A\n  ${getTeamList('A') || 'Empty'}\n\n● TEAM B\n  ${getTeamList('B') || 'Empty'}`;
        document.getElementById('shareTextResult').value = txt;
    }

    function copyToClipboard() {
        const textarea = document.getElementById('shareTextResult');
        if(!textarea.value) return alert('결과 데이터가 없습니다.');
        textarea.select(); document.execCommand('copy'); alert('결과가 복사되었습니다.');
    }

    function fillSamplePlayers() {
        const sampleNames = ["김민우", "박지성", "이준서", "최재혁", "정현우", "강도현", "윤성민", "한태양", "신진우", "조상범", "임찬우", "서동현", "고병준", "백승호", "송민재", "유하준"];
        const positions = ["FW", "MF", "DF", "GK", "FW", "MF", "DF", "MF", "FW", "DF", "MF", "GK", "DF", "MF", "FW", "MF"];
        const tiers = ["상", "상", "하", "중", "상", "중", "하", "중", "상", "중", "중", "중", "하", "상", "중", "중"];
        clubPlayers = [];
        for(let i=0; i<16; i++) {
            clubPlayers.push({ id: 'P_' + (i+1), name: sampleNames[i], preferredPosition: positions[i], tier: tiers[i], internalRating: tiers[i]==='상'?80:(tiers[i]==='하'?20:50) });
        }
        todayAttendedIds = clubPlayers.map(p => p.id);
        saveData(); renderPlayerCards();
    }

    function resetAll() {
        clubPlayers = []; todayAttendedIds = []; currentPitchPlayers = [];
        localStorage.removeItem('BW_MODAL_PLAYERS_V2');
        document.getElementById('shareTextResult').value = '';
        document.querySelectorAll('.drop-zone').forEach(z => z.innerHTML = '');
        renderPlayerCards();
    }

    function saveData() { localStorage.setItem('BW_MODAL_PLAYERS_V2', JSON.stringify(clubPlayers)); }
</script>
</body>
</html>
